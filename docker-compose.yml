services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  auth-users-service:
    build:
      context: .
      dockerfile: backend/auth-users-service/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "${AUTH_SERVICE_PORT}:3001"

  tours-service:
    build:
      context: .
      dockerfile: backend/tours-service/Dockerfile
    env_file:
      - .env
    ports:
      - "${TOURS_SERVICE_PORT}:3002"

  location-service:
    build:
      context: .
      dockerfile: backend/location-service/Dockerfile
    env_file:
      - .env
    ports:
      - "${LOCATION_SERVICE_PORT}:3003"

  gateway:
    build:
      context: .
      dockerfile: backend/gateway/Dockerfile
    env_file:
      - .env
    depends_on:
      - auth-users-service
      - tours-service
      - location-service
    ports:
      - "${GATEWAY_PORT}:3000"

volumes:
  pgdata:
